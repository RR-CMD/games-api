services:
  postgres_db:
    image: postgres:15-alpine
    container_name: games_db_container
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: games_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  games_api:
    build: .
    container_name: games_api_container
    ports:
      - "8080:8080"
    depends_on:
      postgres_db:
        condition: service_healthy
    environment:
      - DB_URL=jdbc:postgresql://postgres_db:5432/games_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=root

volumes:
  postgres_data: